<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Калькулятор пошива и печати футболок</title>
<style>
:root{--bg:#f8f1f3;--surface:#fff;--text:#171717;--muted:#5e5e5e;--line:#d6e6da;--line-strong:#8fb89a;--accent:#3d8b57;--accent-dark:#2f6f45;--accent-soft:#eaf5ed;--shadow:0 10px 30px rgba(57,96,69,.10)}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text);padding:40px 16px}
.wrap{max-width:1180px;margin:0 auto;background:linear-gradient(180deg,rgba(255,255,255,.92),rgba(255,255,255,.99));border:1px solid var(--line);border-radius:34px;box-shadow:var(--shadow);overflow:hidden;position:relative}
.wrap:before{content:'';position:absolute;left:0;top:0;width:340px;height:340px;background:radial-gradient(circle,rgba(61,139,87,.11),transparent 68%)}
.head{padding:42px 38px 20px;text-align:center;position:relative;z-index:1}
h1{margin:0;font-size:42px;line-height:1.05;font-weight:800;letter-spacing:-.03em}
.grid{display:grid;grid-template-columns:minmax(0,1.08fr) minmax(0,.92fr);gap:22px;padding:12px 22px 22px;position:relative;z-index:1}
.panel,.card{background:#fff;border:1px solid var(--line);border-radius:28px;padding:22px;min-width:0}
.panel{background:linear-gradient(180deg,#fcfffd,#f7fbf8)}
.step+.step{margin-top:18px}
.step.is-hidden{display:none}
.step h3,.card h3{margin:0 0 12px;font-size:18px;font-weight:800}
.seg,.dim-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.btn{border:1.5px solid var(--line);background:#fff;border-radius:14px;min-height:54px;padding:10px 12px;cursor:pointer;transition:.18s ease;font-size:15px;font-weight:700;color:#333}
.btn:hover{transform:translateY(-1px);border-color:var(--line-strong);background:#fbfefc}
.btn.active{background:var(--accent-soft);color:var(--accent-dark);border-color:var(--accent)}
.btn:disabled,.sw:disabled,.mini-btn:disabled{opacity:.42;cursor:not-allowed;transform:none;box-shadow:none;background:#fafafa}
.swatches{display:grid;grid-template-columns:repeat(auto-fit,52px);gap:12px}
.sw{width:52px;height:52px;border-radius:50%;border:2px solid #d7d7d7;cursor:pointer;background:var(--sw);transition:.18s ease}
.sw.white{box-shadow:inset 0 0 0 1px #d8d8d8}
.sw.active{border-color:var(--accent);box-shadow:0 0 0 4px rgba(61,139,87,.14)}
.color-note{color:#c62828;font-size:13px;line-height:1.4;margin-top:10px;font-weight:700}
.place-list{display:grid;gap:12px}
.place-card{border:1px solid #dfece2;border-radius:18px;padding:14px;background:#fff}
.place-card.is-on{background:#f9fdf9;border-color:#cce2d3}
.place-top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}
.place-name{font-size:16px;font-weight:800}
.toggle{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:9px 14px;font-size:13px;font-weight:800;cursor:pointer}
.toggle.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.colors-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
.color-buttons{display:grid;grid-template-columns:repeat(7,minmax(40px,1fr));gap:8px}
.mini-btn{border:1.5px solid var(--line);background:#fff;border-radius:12px;min-height:42px;padding:6px 8px;cursor:pointer;font-size:13px;font-weight:800}
.mini-btn.active{background:var(--accent-soft);color:var(--accent-dark);border-color:var(--accent)}
.sum{display:grid;gap:14px;min-width:0}
.badges{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.badge{border:1px solid #dfece2;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:700;color:#36523f;background:#fff}
.row{display:flex;justify-content:space-between;gap:14px;padding:10px 0;border-bottom:1px dashed #e9efe9;font-size:15px;color:#444}
.row:last-child{border-bottom:none;padding-bottom:0}
.row strong{color:#191919}
.row.total-line{font-weight:800;color:#1b3b27}
.row.total-line strong{color:var(--accent-dark)}
.totalcard{background:linear-gradient(180deg,#f8fcf9,#eef7f1);border-color:#d8ebde}
.total{font-size:40px;font-weight:900;color:var(--accent-dark);line-height:1;margin-top:6px}
.status,.warn{font-size:12px;line-height:1.45;margin-top:10px}
.status{color:var(--muted)}
.warn{padding:10px 12px;border-radius:12px;background:#fff8e8;border:1px solid #f2dfaa;color:#6a5722}
@media (max-width:980px){.grid{grid-template-columns:1fr}h1{font-size:34px}}
@media (max-width:560px){
  body{padding:10px 8px}
  .wrap{border-radius:22px}
  .head{padding:18px 14px 10px}
  h1{font-size:24px}
  .grid{padding:10px;gap:10px}
  .panel,.card{padding:14px;border-radius:18px}
  .seg,.dim-grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .btn{min-height:46px;padding:8px;font-size:13px;border-radius:12px}
  .swatches{grid-template-columns:repeat(4,52px);gap:10px}
  .sw{width:48px;height:48px}
  .place-top{align-items:flex-start;flex-direction:column}
  .colors-row{grid-template-columns:1fr}
  .color-buttons{grid-template-columns:repeat(4,minmax(38px,1fr))}
  .badge{font-size:12px;padding:7px 10px}
  .row{font-size:12px}
  .total{font-size:28px}
  .color-note{font-size:12px}
}
</style>
</head>
<body>
<section class="wrap">
  <div class="head">
    <h1>Калькулятор пошива и печати футболок</h1>
  </div>
  <div class="grid" id="app"></div>
</section>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxKCip7iW5-4rNJLta1KVZ7AcKHOAz6-WvG5E1WzWZKw9IWIHQQHrUOicurP1jFL2OW/exec';

let TABLE = [];
let TABLE_INDEX = new Map();
let DATA_SOURCE_LABEL = 'Google Sheets (Apps Script)';

const APP = {
  genders: [
    { id: 'male', label: 'Мужской' },
    { id: 'female', label: 'Женский' }
  ],
  materials: [
    { id: 'cotton100', label: '100% хлопок', densities: [145, 155, 180, 240, 300] },
    { id: 'kulirka_lycra', label: 'Кулирка с лайкрой 92/8', densities: [165, 200, 240] }
  ],
  colors: [
    { id: 'white', label: 'Белый', hex: '#ffffff', className: 'white' },
    { id: 'black', label: 'Чёрный', hex: '#111111' },
    { id: 'red', label: 'Красный', hex: '#d64242' },
    { id: 'blue', label: 'Синий', hex: '#295bc8' }
  ],
  quantities: [50, 100, 200, 300, 500, 1000],
  printColors: [0, 1, 2, 3, 4, 5, 6],
  places: [
    { id: 'chest', label: 'Грудь' },
    { id: 'back', label: 'Спина' },
    { id: 'leftSleeve', label: 'Левый рукав' },
    { id: 'rightSleeve', label: 'Правый рукав' }
  ],
  models: [
    { id: 'standard', label: 'Стандартная' },
    { id: 'oversize', label: 'Оверсайз' }
  ]
};

const money = v => new Intl.NumberFormat('ru-RU', { maximumFractionDigits: 0 }).format(Math.round(v || 0)) + ' руб.';
const n0 = v => new Intl.NumberFormat('ru-RU', { maximumFractionDigits: 0 }).format(v || 0);

function normalizeRow(row) {
  return {
    ...row,
    density: Number(row.density || 0),
    qty: Number(row.qty || 0),
    base_unit_price: Number(row.base_unit_price || 0),
    discount_per_unit: Number(row.discount_per_unit || 0),
    final_unit_price: Number(row.final_unit_price || 0),
    sew_total_price: Number(row.sew_total_price || 0),
    print_0: Number(row.print_0 || 0),
    print_1: Number(row.print_1 || 0),
    print_2: Number(row.print_2 || 0),
    print_3: Number(row.print_3 || 0),
    print_4: Number(row.print_4 || 0),
    print_5: Number(row.print_5 || 0),
    print_6: Number(row.print_6 || 0)
  };
}

function makeKey(gender, model, material, density, color, qty) {
  return [gender, model, material, Number(density || 0), color, Number(qty || 0)].join('|');
}

function setTable(items) {
  TABLE = (items || []).map(normalizeRow);
  TABLE_INDEX = new Map(
    TABLE.map(row => [
      makeKey(row.gender_id, row.model_id, row.material_id, row.density, row.color_id, row.qty),
      row
    ])
  );
}

function loadJsonp(url) {
  return new Promise((resolve, reject) => {
    const callbackName = '__shirtsCombinedCallback_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    const sep = url.includes('?') ? '&' : '?';

    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('Таймаут загрузки данных'));
    }, 15000);

    function cleanup() {
      clearTimeout(timeout);
      if (script.parentNode) script.parentNode.removeChild(script);
      try { delete window[callbackName]; } catch (_) { window[callbackName] = undefined; }
    }

    window[callbackName] = (data) => {
      cleanup();
      resolve(data);
    };

    script.onerror = () => {
      cleanup();
      reject(new Error('Ошибка загрузки скрипта'));
    };

    script.src = url + sep + 'callback=' + encodeURIComponent(callbackName);
    document.body.appendChild(script);
  });
}

async function initTable() {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === 'PASTE_YOUR_WEB_APP_URL_HERE') {
    setTable([]);
    return { ok: false, error: 'Не вставлен URL Apps Script.' };
  }

  try {
    const data = await loadJsonp(APPS_SCRIPT_URL);

    if (!data || !data.ok) {
      throw new Error((data && data.error) || 'Пустой ответ Apps Script');
    }

    if (!Array.isArray(data.items) || !data.items.length) {
      throw new Error('Apps Script вернул пустую таблицу');
    }

    setTable(data.items);
    return { ok: true, error: '' };
  } catch (err) {
    setTable([]);
    return { ok: false, error: String(err && err.message ? err.message : err) };
  }
}

class Calc {
  constructor(root, initState) {
    this.root = root;
    this.status = initState || { ok: false, error: 'Неизвестное состояние' };
    this.s = {
      gender: '',
      model: '',
      material: '',
      density: null,
      color: '',
      qty: null,
      chestEnabled: false,
      chestColors: 0,
      backEnabled: false,
      backColors: 0,
      leftSleeveEnabled: false,
      leftSleeveColors: 0,
      rightSleeveEnabled: false,
      rightSleeveColors: 0
    };
    this.render();
  }

  btn(label, active, a, v) {
    return `<button type="button" class="btn ${active ? 'active' : ''}" data-a="${a}" data-v="${v}">${label}</button>`;
  }

  colorSwatch(c) {
    const active = this.s.color === c.id;
    const cls = c.className ? ` ${c.className}` : '';
    return `<button type="button" class="sw${cls} ${active ? 'active' : ''}" title="${c.label}" aria-label="${c.label}" style="--sw:${c.hex}" data-a="color" data-v="${c.id}"></button>`;
  }

  placeCard(place) {
    const enabled = !!this.s[place.id + 'Enabled'];
    const colors = this.s[place.id + 'Colors'];

    return `<div class="place-card ${enabled ? 'is-on' : ''}">
      <div class="place-top">
        <div class="place-name">${place.label}</div>
        <button type="button" class="toggle ${enabled ? 'on' : ''}" data-a="toggle" data-place="${place.id}" data-v="${enabled ? 'off' : 'on'}">
          ${enabled ? 'Включено' : 'Не выбрано'}
        </button>
      </div>
      <div class="colors-row">
        <div>Количество цветов печати</div>
        <div class="color-buttons">
          ${APP.printColors.map(num => `
            <button type="button" class="mini-btn ${num === colors ? 'active' : ''}"
              data-a="placeColors"
              data-place="${place.id}"
              data-v="${num}"
              ${enabled ? '' : 'disabled'}>
              ${num === 0 ? '—' : num}
            </button>
          `).join('')}
        </div>
      </div>
    </div>`;
  }

  resetPrints() {
    this.s.chestEnabled = false; this.s.chestColors = 0;
    this.s.backEnabled = false; this.s.backColors = 0;
    this.s.leftSleeveEnabled = false; this.s.leftSleeveColors = 0;
    this.s.rightSleeveEnabled = false; this.s.rightSleeveColors = 0;
  }

  findRow() {
    const s = this.s;
    return TABLE_INDEX.get(makeKey(s.gender, s.model, s.material, s.density, s.color, s.qty)) || null;
  }

  getPrintTotal(row, n) {
    if (!row || !n) return 0;
    return Number(row['print_' + n] || 0);
  }

  render() {
    const s = this.s;

    const materialObj = APP.materials.find(x => x.id === s.material);
    const modelObj = APP.models.find(x => x.id === s.model);
    const colorObj = APP.colors.find(x => x.id === s.color);
    const genderObj = APP.genders.find(x => x.id === s.gender);
    const densities = materialObj ? materialObj.densities : [];
    const row = this.findRow();

    const allBaseSelected = !!(s.gender && s.model && s.material && s.density && s.color && s.qty);

    const sewUnit = row ? Number(row.base_unit_price || 0) : 0;
    const sewDiscount = row ? Number(row.discount_per_unit || 0) : 0;
    const sewFinalUnit = row ? Number(row.final_unit_price || 0) : 0;
    const sewTotal = row ? Number(row.sew_total_price || 0) : 0;

    const chest = s.chestEnabled ? this.getPrintTotal(row, s.chestColors) : 0;
    const back = s.backEnabled ? this.getPrintTotal(row, s.backColors) : 0;
    const leftSleeve = s.leftSleeveEnabled ? this.getPrintTotal(row, s.leftSleeveColors) : 0;
    const rightSleeve = s.rightSleeveEnabled ? this.getPrintTotal(row, s.rightSleeveColors) : 0;

    const printItems = [
      { label: 'Печать: грудь', value: chest, enabled: s.chestEnabled && s.chestColors > 0 },
      { label: 'Печать: спина', value: back, enabled: s.backEnabled && s.backColors > 0 },
      { label: 'Печать: левый рукав', value: leftSleeve, enabled: s.leftSleeveEnabled && s.leftSleeveColors > 0 },
      { label: 'Печать: правый рукав', value: rightSleeve, enabled: s.rightSleeveEnabled && s.rightSleeveColors > 0 }
    ].filter(item => item.enabled);

    const printRows = printItems
      .map(item => `<div class="row"><span>${item.label}</span><strong>${money(item.value)}</strong></div>`)
      .join('');

    const hasPrintRows = printItems.length > 0;
    const printTotal = printItems.reduce((sum, item) => sum + item.value, 0);
    const grandTotal = sewTotal + printTotal;
    const grandPerUnit = s.qty ? grandTotal / s.qty : 0;
    const hasAnyPrice = !!(s.qty && row);

    this.root.innerHTML = `
      <div class="panel">
        <div class="step">
          <h3>Выберите пол</h3>
          <div class="seg">${APP.genders.map(i => this.btn(i.label, s.gender === i.id, 'gender', i.id)).join('')}</div>
        </div>

        <div class="step ${s.gender ? '' : 'is-hidden'}">
          <h3>Модель</h3>
          <div class="seg">${APP.models.map(i => this.btn(i.label, s.model === i.id, 'model', i.id)).join('')}</div>
        </div>

        <div class="step ${(s.gender && s.model) ? '' : 'is-hidden'}">
          <h3>Материал</h3>
          <div class="seg">${APP.materials.map(i => this.btn(i.label, s.material === i.id, 'material', i.id)).join('')}</div>
        </div>

        <div class="step ${(s.gender && s.model && s.material) ? '' : 'is-hidden'}">
          <h3>Плотность</h3>
          <div class="dim-grid">${densities.map(i => this.btn(i + ' г/м²', s.density === i, 'density', i)).join('')}</div>
        </div>

        <div class="step ${(s.gender && s.model && s.material && s.density) ? '' : 'is-hidden'}">
          <h3>Цвет изделия</h3>
          <div class="swatches">${APP.colors.map(c => this.colorSwatch(c)).join('')}</div>
          <div class="color-note">*Возможен пошив в других цветах — уточняйте у менеджера.</div>
        </div>

        <div class="step ${(s.gender && s.model && s.material && s.density && s.color) ? '' : 'is-hidden'}">
          <h3>Тираж</h3>
          <div class="seg">${APP.quantities.map(i => this.btn(i + ' шт.', s.qty === i, 'qty', i)).join('')}</div>
        </div>

        <div class="step ${allBaseSelected ? '' : 'is-hidden'}">
          <h3>Места нанесения</h3>
          <div class="place-list">${APP.places.map(p => this.placeCard(p)).join('')}</div>
        </div>
      </div>

      <div class="sum">
        <div class="card">
          <div class="badges">
            ${genderObj ? `<div class="badge">${genderObj.label}</div>` : ''}
            ${modelObj ? `<div class="badge">${modelObj.label}</div>` : ''}
            ${materialObj ? `<div class="badge">${materialObj.label}</div>` : ''}
            ${s.density ? `<div class="badge">${s.density} г/м²</div>` : ''}
            ${colorObj ? `<div class="badge">${colorObj.label}</div>` : ''}
            ${s.qty ? `<div class="badge">${n0(s.qty)} шт.</div>` : ''}
            ${s.chestEnabled && s.chestColors ? `<div class="badge">Грудь: ${s.chestColors} цв.</div>` : ''}
            ${s.backEnabled && s.backColors ? `<div class="badge">Спина: ${s.backColors} цв.</div>` : ''}
            ${s.leftSleeveEnabled && s.leftSleeveColors ? `<div class="badge">Левый рукав: ${s.leftSleeveColors} цв.</div>` : ''}
            ${s.rightSleeveEnabled && s.rightSleeveColors ? `<div class="badge">Правый рукав: ${s.rightSleeveColors} цв.</div>` : ''}
          </div>
        </div>

        ${hasAnyPrice ? `
          <div class="card">
            <h3>Расчёт</h3>

            <div class="row">
              <span>Пошив за 1 шт.</span>
              <strong>${money(sewUnit)}</strong>
            </div>

            <div class="row">
              <span>Скидка за 1 шт.</span>
              <strong>${money(sewDiscount)}</strong>
            </div>

            <div class="row">
              <span>Пошив за 1 шт. со скидкой</span>
              <strong>${money(sewFinalUnit)}</strong>
            </div>

            <div class="row">
              <span>Пошив, итого</span>
              <strong>${money(sewTotal)}</strong>
            </div>

            ${printRows}

            ${hasPrintRows ? `
              <div class="row total-line">
                <span>Печать, итого</span>
                <strong>${money(printTotal)}</strong>
              </div>
            ` : ''}

            <div class="row total-line">
              <span>Итого за 1 шт.</span>
              <strong>${money(grandPerUnit)}</strong>
            </div>
          </div>

          <div class="card totalcard">
            <h3>Общая стоимость заказа</h3>
            <div class="total">${money(grandTotal)}</div>
            <div style="color:#a94442; font-size:12px; margin-top:6px; line-height:1.3;">
              *Предварительная стоимость. Для точного расчёта уточняйте у менеджера.
            </div>
          </div>
        ` : ''}

        ${allBaseSelected && !row ? `
          <div class="warn">Для выбранной комбинации строка в таблице не найдена.</div>
        ` : ''}

        ${this.status && this.status.error ? `
          <div class="warn">${this.status.error}</div>
        ` : ''}
      </div>
    `;

    this.root.querySelectorAll('[data-a]').forEach(el => el.addEventListener('click', () => {
      const a = el.dataset.a;
      let v = el.dataset.v;

      if (['density', 'qty', 'placeColors'].includes(a)) v = Number(v);

      if (a === 'gender') {
        s.gender = v;
        s.model = '';
        s.material = '';
        s.density = null;
        s.color = '';
        s.qty = null;
        this.resetPrints();
      }

      if (a === 'model') {
        s.model = v;
        s.material = '';
        s.density = null;
        s.color = '';
        s.qty = null;
        this.resetPrints();
      }

      if (a === 'material') {
        s.material = v;
        s.density = null;
        s.color = '';
        s.qty = null;
        this.resetPrints();
      }

      if (a === 'density') {
        s.density = v;
        s.color = '';
        s.qty = null;
        this.resetPrints();
      }

      if (a === 'color') {
        s.color = v;
        s.qty = null;
        this.resetPrints();
      }

      if (a === 'qty') {
        s.qty = v;
        this.resetPrints();
      }

      if (a === 'toggle') {
        const p = el.dataset.place;
        const nextOn = v === 'on';
        s[p + 'Enabled'] = nextOn;
        if (!nextOn) s[p + 'Colors'] = 0;
        if (nextOn && !s[p + 'Colors']) s[p + 'Colors'] = 1;
      }

      if (a === 'placeColors') {
        const p = el.dataset.place;
        s[p + 'Colors'] = v;
        s[p + 'Enabled'] = v > 0;
      }

      this.render();
    }));
  }
}

(async () => {
  const initState = await initTable();
  new Calc(document.getElementById('app'), initState);
})();
</script>
</body>
</html>
